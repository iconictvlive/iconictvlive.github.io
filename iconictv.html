<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICONIC TV | Now CricketTV</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;}
body{
  background:#0a0a0f;
  color:#f0f0f5;
  font-family:'DM Sans',sans-serif;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  overflow:hidden;
  position:relative;
  text-align:center;
  padding:20px;
}

/* Animated background */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(230,57,70,0.12) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 30%,rgba(76,201,240,0.1) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 80%,rgba(230,57,70,0.06) 0%,transparent 50%);
  animation:bgshift 8s ease-in-out infinite alternate;
  pointer-events:none;z-index:0;
}
@keyframes bgshift{
  0%{opacity:.6;transform:scale(1);}
  100%{opacity:1;transform:scale(1.05);}
}

/* Grid lines */
body::after{
  content:'';position:fixed;inset:0;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(255,255,255,.02) 60px,rgba(255,255,255,.02) 61px),
    repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(255,255,255,.02) 60px,rgba(255,255,255,.02) 61px);
  pointer-events:none;z-index:0;
}

.wrap{position:relative;z-index:1;max-width:600px;width:100%;}

/* Old logo */
.old-brand{
  display:inline-flex;align-items:center;gap:12px;
  margin-bottom:32px;
  opacity:.4;
  animation:fadeIn .6s ease both;
}
.old-logo{
  width:48px;height:48px;
  background:linear-gradient(135deg,#e63946,#4cc9f0);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:16px;color:#fff;letter-spacing:1px;
}
.old-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:#fff;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:.4;transform:translateY(0)}}

/* Arrow */
.arrow-down{
  font-size:24px;color:rgba(255,255,255,.2);
  margin-bottom:24px;
  animation:bounce .8s ease-in-out infinite alternate;
}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(6px)}}

/* Main badge */
.rebrand-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(230,57,70,.1);
  border:1px solid rgba(230,57,70,.3);
  color:#ff6b6b;
  font-size:11px;font-weight:700;letter-spacing:2px;
  padding:6px 18px;border-radius:20px;
  margin-bottom:20px;
  animation:fadeUp .6s .1s ease both;
}
.dot{width:6px;height:6px;background:#e63946;border-radius:50%;animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* New name */
.new-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,14vw,100px);
  line-height:.85;letter-spacing:2px;
  background:linear-gradient(135deg,#fff 0%,#e63946 50%,#4cc9f0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;
  animation:fadeUp .6s .2s ease both;
}

.tagline{
  font-size:16px;color:rgba(255,255,255,.5);
  font-weight:400;margin-bottom:8px;
  animation:fadeUp .6s .25s ease both;
}
.tagline strong{color:rgba(255,255,255,.85);font-weight:600;}

/* Divider */
.divider{
  width:60px;height:2px;
  background:linear-gradient(90deg,#e63946,#4cc9f0);
  margin:24px auto;
  border-radius:2px;
  animation:fadeUp .6s .3s ease both;
}

/* Features */
.features{
  display:flex;justify-content:center;gap:20px;flex-wrap:wrap;
  margin-bottom:36px;
  animation:fadeUp .6s .35s ease both;
}
.feature{
  display:flex;align-items:center;gap:7px;
  font-size:13px;color:rgba(255,255,255,.5);font-weight:500;
}
.feature svg{width:15px;height:15px;flex-shrink:0;}
.feature.green svg{stroke:#06d6a0;}
.feature.blue svg{stroke:#4cc9f0;}
.feature.red svg{stroke:#e63946;}

/* CTA Button */
.cta-btn{
  display:inline-flex;align-items:center;gap:12px;
  background:linear-gradient(135deg,#e63946,#c1121f);
  color:#fff;font-weight:700;font-size:16px;
  padding:16px 44px;border-radius:14px;
  text-decoration:none;
  box-shadow:0 0 40px rgba(230,57,70,.3);
  transition:all .25s;
  animation:fadeUp .6s .4s ease both;
  letter-spacing:.5px;
}
.cta-btn:hover{transform:translateY(-3px);box-shadow:0 0 60px rgba(230,57,70,.5);}
.cta-btn svg{width:20px;height:20px;fill:white;}

/* Sub note */
.sub-note{
  font-size:12px;color:rgba(255,255,255,.2);
  margin-top:16px;letter-spacing:.5px;
  animation:fadeUp .6s .45s ease both;
}

/* Corner decoration */
.corner{position:fixed;width:200px;height:200px;border:1px solid rgba(230,57,70,.08);border-radius:50%;}
.corner-tl{top:-100px;left:-100px;}
.corner-br{bottom:-100px;right:-100px;border-color:rgba(76,201,240,.08);}
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-br"></div>

<div class="wrap">

  <!-- Old brand -->
  <div class="old-brand">
    <div class="old-logo">IC</div>
    <div class="old-name">ICONIC TV</div>
  </div>

  <!-- Arrow -->
  <div class="arrow-down">↓</div>

  <!-- Badge -->
  <div class="rebrand-badge"><span class="dot"></span> NOW REBRANDED AS</div>

  <!-- New name -->
  <div class="new-name">CRICKET<br>TV</div>

  <p class="tagline">Your favourite <strong>ICONIC TV</strong> is now <strong>CricketTV</strong></p>
  <p class="tagline" style="font-size:14px;margin-top:4px;">Same free cricket. Better experience. By Rishi.</p>

  <div class="divider"></div>

  <!-- Features -->
  <div class="features">
    <div class="feature green">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      Free Live Cricket
    </div>
    <div class="feature blue">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      HD Streaming
    </div>
    <div class="feature red">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      No Subscription
    </div>
    <div class="feature green">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      IPL 2026 Live
    </div>
  </div>

  <!-- CTA -->
  <a href="https://rishiicn.github.io" class="cta-btn">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    Watch Everything Now
  </a>

  <p class="sub-note">rishiicn.github.io · @rishi.icn</p>

</div>

</body>
</html>
