<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOX Alert</title>
<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .banner {
    width: 80vw;
    max-width: 960px;
    aspect-ratio: 16 / 9;
    background: linear-gradient(135deg, #8B0000, #FF0000);
    border: 4px solid #fff;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 30px rgba(255,0,0,0.8);
    text-align: center;
    padding: 20px;
  }

  .alert {
    font-size: 3rem;
    font-weight: bold;
    color: #fff;
    letter-spacing: 3px;
    animation: blink 1s infinite;
  }

  .message {
    margin-top: 20px;
    font-size: 1.8rem;
    color: #fff;
    font-weight: 600;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="banner">
  <div class="alert">⚠ RED ALERT ⚠</div>
  <div class="message">
    FOX CRICKET ONLY AVAILABLE FOR NEPAL USERS
  </div>
</div>

</body>
</html>
