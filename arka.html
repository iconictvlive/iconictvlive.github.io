<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARKAPRATIM PATRA PLAYER</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
        --accent-color: #00d2ff;
    }

    * {
        user-select: none;
        -webkit-user-select: none;
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: var(--bg-gradient);
        background-attachment: fixed;
        font-family: 'Poppins', sans-serif;
        color: white;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
    }

    /* Password Overlay */
    #auth-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(20px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }

    .login-box {
        background: rgba(255, 255, 255, 0.05);
        padding: 40px;
        border-radius: 24px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        width: 340px;
    }

    .input-container {
        position: relative;
        margin: 20px 0;
    }

    input[type="password"], input[type="text"] {
        width: 100%;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: rgba(0, 0, 0, 0.3);
        color: white;
        text-align: center;
        outline: none;
        font-size: 14px;
    }

    .toggle-pass {
        margin-top: 10px;
        font-size: 12px;
        color: var(--accent-color);
        cursor: pointer;
        display: inline-block;
    }

    button {
        background: var(--accent-color);
        color: #000;
        border: none;
        padding: 12px 30px;
        border-radius: 10px;
        font-weight: 600;
        cursor: pointer;
        width: 100%;
        transition: 0.3s;
    }

    button:hover { background: #fff; transform: scale(1.02); }

    /* Main UI */
    #main-content {
        display: none;
        flex-direction: column;
        height: 100vh;
    }

    .header {
        padding: 15px;
        text-align: center;
        font-size: 18px;
        font-weight: 600;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .player-container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .video-box {
        width: 80%; 
        aspect-ratio: 16 / 9;
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.15);
        box-shadow: 0 0 50px rgba(0,0,0,0.8);
    }

    iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body oncontextmenu="return false;">

<div id="auth-overlay">
    <div class="login-box">
        <h2 style="margin:0; letter-spacing: 1px;">ARKA PREMIUM</h2>
        <p style="font-size: 11px; color: #aaa; margin-top: 5px;">ENTER ACCESS CODE</p>
        
        <div class="input-container">
            <input type="password" id="passInput" placeholder="Password">
            <div class="toggle-pass" onclick="toggleVisibility()">👁️ Show/Hide Password</div>
        </div>
        
        <button onclick="checkPass()">UNLOCK PLAYER</button>
    </div>
</div>

<div id="main-content">
    <div class="header">ARKA PREMIUM ICONICT TV</div>
    <div class="player-container">
        <div class="video-box">
            <iframe id="videoFrame" src="" allowfullscreen scrolling="no"></iframe>
        </div>
    </div>
</div>

<script>
    // 1. Dual Password Logic + Show/Hide
    function toggleVisibility() {
        const input = document.getElementById('passInput');
        input.type = (input.type === "password") ? "text" : "password";
    }

    function checkPass() {
        const pass = document.getElementById('passInput').value;
        // Allows both passwords
        if (pass === "arka@anjali" || pass === "arka@123") {
            document.getElementById('auth-overlay').style.display = "none";
            document.getElementById('main-content').style.display = "flex";
            document.getElementById('videoFrame').src = "https://hlsplayers.pages.dev/player3?url=https://ott-nettv-02.nettv.com.np/iptvsports/netSTARSPORTS1HD1500.stream/playlist.m3u8";
        } else {
            alert("Incorrect Password!");
            document.getElementById('passInput').value = "";
        }
    }

    // 2. DevTools Blocking & Site Closure
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) || 
            (e.ctrlKey && e.keyCode == 85)) {
            window.location.href = "about:blank";
            return false;
        }
    };

    // Detect if DevTools is opened via side menu
    setInterval(function() {
        const start = performance.now();
        debugger; 
        if (performance.now() - start > 100) {
            window.location.href = "about:blank";
        }
    }, 1000);

    // Enter Key Support
    document.getElementById('passInput').addEventListener("keypress", (e) => {
        if (e.key === "Enter") checkPass();
    });
</script>

</body>
</html>
