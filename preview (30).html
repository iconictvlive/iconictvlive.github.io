<!DOCTYPE html>
<html>
<head>
  <title>M3U8 Player</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    input {
      width: 60%;
      padding: 10px;
      margin: 10px;
    }
    button {
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
    }
    video {
      width: 80%;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🔥 M3U8 Player</h1>

<input type="text" id="url" placeholder="Paste M3U8 URL here">
<br>
<button onclick="play()">Play</button>

<video id="video" controls autoplay></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
function play() {
  var video = document.getElementById('video');
  var url = document.getElementById('url').value;

  if (Hls.isSupported()) {
    var hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
}
</script>

</body>
</html>
